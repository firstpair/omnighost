name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          CODENAME=$(awk -F'|' -v tag="$TAG" '$3 ~ " " tag " " { gsub(/[* ]/, "", $2); print $2; exit }' RELEASES.md)
          TITLE="${CODENAME:+$CODENAME }$TAG"
          ASSETS=(main.js manifest.json styles.css)
          for asset in docs/book/dist/obsidian.epub docs/book/dist/obsidian.pdf; do
            if [ -f "$asset" ]; then
              ASSETS+=("$asset")
            fi
          done

          gh release create "$TAG" \
            --title "$TITLE" \
            --generate-notes \
            "${ASSETS[@]}"
